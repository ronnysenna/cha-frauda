version: '3.8'

services:
  # Backend Node.js
  api:
    build: ./backend
    container_name: cha-frauda-api
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://chafrauda:Ideal2015net@postgres:5432/chafrauda?sslmode=disable
      PORT: 3000
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - cha-frauda-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/stats"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    volumes:
      - ./backend:/app
      - /app/node_modules

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: cha-frauda-postgres
    environment:
      POSTGRES_USER: chafrauda
      POSTGRES_PASSWORD: Ideal2015net
      POSTGRES_DB: chafrauda
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    ports:
      - "5432:5432"
    restart: unless-stopped
    networks:
      - cha-frauda-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chafrauda -d chafrauda"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Nginx Proxy Reverso (opcional)
  nginx:
    image: nginx:alpine
    container_name: cha-frauda-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - cha-frauda-network

volumes:
  postgres_data:
    driver: local

networks:
  cha-frauda-network:
    driver: bridge
